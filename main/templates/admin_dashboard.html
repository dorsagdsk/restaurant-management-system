{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <!-- <link rel="stylesheet" href="{% static 'css/admin_style.css' %}"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container"> 
            <div class="header-left">
                <input type="text" id="search-box" placeholder="Search...">
                <button id="search-button">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <!-- <div class="header-center">
                <h1>
                    <i class="fas fa-cherry" style="color: red;"></i>
                    <img src="{% static 'images/cherry.png' %}" alt="Cherry Icon" class="cherry-icon">
                    Cherry Restaurant
                    <img src="{% static 'images/cherry.png' %}" alt="Cherry Icon" class="cherry-icon">
                </h1>
            </div> -->
            <div class="header-right">
                <button id="logout-button">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
                
            </div>
            
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>پنل مدیریت</h3>
        <ul>
            <li><a href="{% url 'add_food' %}"><i class="fas fa-utensils"></i> اضافه کردن غذای جدید</a></li>
            <li><a href="{% url 'menu-items' %}"><i class="fas fa-list"></i> لیست غذاها</a></li>
            <li><a href="/add-employee"><i class="fas fa-user-plus"></i> اضافه کردن کارمند جدید</a></li>
            <li><a href="/manage-employees/"><i class="fas fa-users"></i> مدیریت کارمندان</a></li>
            <li><a href="/show-discount-page/"><i class="fas fa-dollar"></i> مدیریت کد های تخفیف </a></li>
            <li><a href="/show-best-selling-prouducts/"><i class="fas fa-chart-line"></i> مشاهده پرفروش‌ترین غذاها</a></li>
            <li><a href="/show-order-for-admin/"><i class="fas fa-receipt"></i> مشاهده سفارش ‌ها </a></li>
            
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2>لیست غذاها</h2>
        <div id="food-list" data-id="${food.id}">
            <!-- غذاها از API پر می‌شوند -->
        </div>
    </div>

    <script src="{% static 'js/food_list.js' %}"></script>
    <script src="{% static 'js/logout.js' %}"></script>
</body>
</html>
