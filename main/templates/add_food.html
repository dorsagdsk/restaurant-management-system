{% load static %}
<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>اضافه کردن غذا</title>
    <!-- <link rel="stylesheet" href="{% static 'css/add_food.css' %}"> -->
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>
<body>
    <!-- فرم اضافه کردن غذا -->
    <form id="food-form" method="POST" enctype="multipart/form-data">  <!-- تغییر id فرم به food-form -->
        {% csrf_token %}
        <label for="item_name">نام غذا:</label>
        <input type="text" id="item_name" name="item_name" required><br>

        <label for="item_category">دسته‌بندی:</label>
        <select id="item_category" name="item_category" required>  <!-- تغییر نام دسته‌بندی -->
            <option value="fast_food">فست فود</option>
            <option value="beverage">نوشیدنی</option>
            <option value="traditional_food">غذای ایرانی</option>
            <option value="dessert">دسر</option>
        </select><br>

        <label for="item_description">توضیحات:</label>
        <textarea id="item_description" name="item_description" required></textarea><br>

        <label for="item_price">قیمت:</label>
        <input type="number" id="item_price" name="item_price" required><br>

        <label for="item_image">تصویر غذا:</label>
        <input type="file" id="item_image" name="item_image"><br>

        <button type="submit">اضافه کردن غذا</button>
    </form>

    <script src="{% static 'js/add_food.js' %}"></script>
</body>
</html>
