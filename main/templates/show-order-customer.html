async function loadOrders() {
    const token = localStorage.getItem('token');
    if (!token) {
        alert('Please log in first.');
        window.location.href = '/login/';
        return;
    }

    try {
        const response = await fetch('/api/orders/', {
            method: 'GET',
            headers: {
                'Authorization': `Token ${token}`,
                'Content-Type': 'application/json',
            },
        });

        if (!response.ok) {
            throw new Error('Error loading orders');
        }

        const orders = await response.json();
        const ordersList = document.getElementById('orders-list');
        ordersList.innerHTML = ''; // Clear previous list

        orders.forEach(order => {
            const address = order.delivery_address;
            const addressString = `${address.city_name}, ${address.neighborhood_name}, ${address.block_number}, ${address.postal_code}, ${address.country_name}`;

            const orderItem = document.createElement('div');
            orderItem.innerHTML = `
                <h3>Order #${order.id}</h3>
                <p>Status: ${order.order_status}</p>
                <p>Delivery Address: ${addressString}</p>
                <p>Total Price: ${order.total_price} تومان</p>
                <p>Created At: ${new Date(order.order_created_on).toLocaleString()}</p>
                <p>Updated At: ${new Date(order.order_updated_on).toLocaleString()}</p>
                <div>
                    <button ${order.order_status === 'confirmed' ? 'disabled' : ''} onclick="cancelOrder(${order.id})">
                        Cancel Order
                    </button>
                </div>
                <div>
                    <h4>Order Items:</h4>
                    <ul>
                        ${order.order_items.map(item => `
                            <li>
                                ${item.ordered_menu_item.name} - Quantity: ${item.ordered_quantity} - Price: 
                                ${item.ordered_menu_item.item_price * item.ordered_quantity} تومان
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
            ordersList.appendChild(orderItem);
        });
    } catch (error) {
        console.error('Error loading orders:', error);
        alert('Error loading orders');
    }
}

async function cancelOrder(orderId) {
    const token = localStorage.getItem('token');
    if (!token) {
        alert('Please log in first.');
        window.location.href = '/login/';
        return;
    }

    try {
        const response = await fetch(`/api/orders/${orderId}/cancel/`, {
            method: 'POST',
            headers: {
                'Authorization': `Token ${token}`,
                'Content-Type': 'application/json',
            },
        });

        if (!response.ok) {
            throw new Error('Error canceling order');
        }

        alert('Order canceled successfully');
        loadOrders();  // Reload orders after cancellation
    } catch (error) {
        console.error('Error canceling order:', error);
        alert('Error canceling order');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadOrders();  // Load orders when the page loads
});
