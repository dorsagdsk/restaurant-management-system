{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>customer</title>
     <link rel="stylesheet" href="{% static 'css/customer_dashboard.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>
<body>
<h1>hi </h1>
  <!-- Header -->
    <header class="header">
        
        <div class="container">
            <div class="header-left">
                <input type="text" id="search-box" placeholder="Search...">
                <button id="search-button">
                    <i class="fas fa-search"></i>
                </button>
            </div>
          <div class="dropdown">
    <button class="dropbtn">
        <i class="fas fa-bars"></i> منو
    </button>
    <div class="dropdown-content">
        <a href="/show_cart/">
            <i class="fas fa-shopping-cart"></i> سبد خرید
        </a>
        <a href="/show-order-customer/">
            <i class="fas fa-list"></i> لیست سفارش‌ها
        </a>
        <a href="/profile/">
            <i class="fas fa-user"></i> پروفایل
        </a>
    </div>
</div>

            <a href="/customer_dashboard/" id="dashboard-button">
                <i class="fas fa-arrow-left"></i> بازگشت به داشبورد
            </a>
         

{#            <span id="username-display"></span>#}
            <div class="header-right">
                <span id="username-display"></span>
                
                <button id="logout-button">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Category Cards -->
    <!-- Category Cards -->
    <div id="bar" style="margin-top: 15px; display: flex; justify-content: space-evenly; flex-wrap: wrap;">
        <!-- دسرها -->
        <a href="#" class="bar" onclick="filterFoods('dessert')">
            <img src="{% static 'images/desserts.png' %}" alt="Desserts">
            <h1>دسرها</h1>
        </a>
        <!-- نوشیدنی‌ها -->
        <a href="#" class="bar" onclick="filterFoods('beverage')">
            <img src="{% static 'images/drink.png' %}" alt="Drinks">
            <h1>نوشیدنی‌ها</h1>
        </a>
        <!-- فست فود -->
        <a href="#" class="bar" onclick="filterFoods('fast_food')">
            <img src="{% static 'images/fast_food.png' %}" alt="Fast Food">
            <h1>فست فود</h1>
        </a>
        <!-- غذای ایرانی -->
        <a href="#" class="bar" onclick="filterFoods('traditional_food')">
            <img src="{% static 'images/iranian_food.png' %}" alt="Iranian Food">
            <h1>غذای ایرانی</h1>
        </a>
    </div>
    
    
    
    <div class="main-content">
    <h2 id="title_food"></h2>
        <div class = "container">
              <div class="food-list" id="food-list" data-id="${food.id}">
        <!-- غذاهای پرطرفدار از API پر می‌شوند -->
    </div>
        </div>
  
</div>
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-left">
                <i class="fas fa-map-marker-alt"></i>
                123 Cherry Street, Albalu City
            </div>
            <div class="footer-right">
                <i class="fas fa-phone"></i>
                +123 456 7890
            </div>
        </div>
    </footer>

    <!-- <script src="{% static 'js/customer_dashboard.js' %}"></script> -->
    <script src="{% static 'js/logout.js' %}"></script>
    <script src="{% static 'js/customer.js' %}"></script> 
</body>
</html>
