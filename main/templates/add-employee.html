{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="{% static 'css/add_employee.css' %}">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">

</head>
<body>
<div class="add-employee-form">
    <h2>اضافه کردن کارمند جدید</h2>
    <form id="add-employee-form">
        <input type="text" id="username" placeholder="نام کاربری" required>
        <input type="password" id="password" placeholder="رمز عبور" required>
        <input type="text" id="first-name" placeholder="نام" required>
        <input type="text" id="last-name" placeholder="نام خانوادگی" required>
        <button type="submit">افزودن کارمند</button>
    </form>
    <div id="add-employee-result"></div>
</div>
    <script src="{% static 'js/add-employee.js' %}"></script>

</body>
</html>
