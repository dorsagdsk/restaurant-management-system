{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/employee_dashboard.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-left">

            </div>
            <div class="header-center">
                <h1>
                    Employee Dashboard
                </h1>
            </div>
            <div class="header-right">
                <button id="logout-button">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>پنل کارمند</h3>
        <ul>
            <li><a href="#" onclick="loadOrders('confirmed')"><i class="fas fa-check-circle"></i> لیست سفارش‌های تکمیل شده</a></li>
            <li><a href="#" onclick="loadOrders('pending')"><i class="fas fa-clock"></i> لیست سفارش‌های تکمیل نشده</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h2>لطفاً یک لیست را انتخاب کنید</h2>
    </div>

    <script src="{% static 'js/employee_dashboard.js' %}"></script>
    <script src="{% static 'js/logout.js' %}"></script>
</body>
</html>
